# =============================================================
# AI APK Factory - APK Build Workflow
# Android project build করে APK release করে
# Phone কিছু করে না, সব GitHub Actions e
# =============================================================

name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'android-project/**'
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x android-project/gradlew 2>/dev/null || true

      - name: Generate Gradle wrapper
        working-directory: android-project
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: android-project
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find android-project -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "Found APK: $APK_PATH"
            ls -la "$APK_PATH"
          else
            echo "No APK found!"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 90

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            ## AI APK Factory - Build ${{ github.run_number }}

            ### What's New
            - Auto-generated by AI APK Factory
            - Built on GitHub Actions (no phone resources used)

            ### Installation
            1. Download `app-debug.apk` below
            2. Enable "Install from unknown sources" on your phone
            3. Tap the APK to install

            ### Features
            - Dark mode dashboard
            - YouTube + Facebook status
            - Analytics viewer
            - Automation controls
            - Log viewer
          files: ${{ steps.find-apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save APK to release directory
        if: success()
        run: |
          mkdir -p release
          cp "${{ steps.find-apk.outputs.apk_path }}" release/app-debug.apk
          echo "APK saved to release/app-debug.apk"

      - name: Commit release APK
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release/
          git diff --staged --quiet || git commit -m "chore: update release APK [skip ci]"
          git push || true
